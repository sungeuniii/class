<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>도장 타이밍 연습</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f4f4f1;
      color: #111;
      font-family: "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    #ui {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      font-size: 12px;
      line-height: 1.7;
      letter-spacing: 0.02em;
      width: min(360px, calc(100vw - 36px));
    }

    .title {
      font-size: 14px;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .desc {
      opacity: 0.75;
      margin-bottom: 10px;
      max-width: 320px;
    }

    .panel {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid #999;
      background: rgba(255,255,255,0.5);
    }

    .small {
      font-size: 11px;
      opacity: 0.7;
    }

    .rank-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 11px;
      border-top: 1px solid #ddd;
      padding: 5px 0;
    }

    .rank-item:first-child {
      border-top: none;
      padding-top: 0;
    }

    .hint {
      position: fixed;
      bottom: 16px;
      left: 18px;
      font-size: 11px;
      opacity: 0.65;
      z-index: 10;
      white-space: pre-line;
    }

    .controls {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 15;
      width: min(280px, calc(100vw - 36px));
      padding: 12px;
      border: 1px solid #999;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(2px);
      font-size: 12px;
    }

    .controls label {
      display: block;
      margin-bottom: 6px;
      font-size: 11px;
      opacity: 0.7;
    }

    .controls input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #888;
      background: #f8f8f6;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .controls button {
      border: 1px solid #333;
      background: #111;
      color: #fff;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .controls button.secondary {
      background: #f8f8f6;
      color: #111;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="title">도장 타이밍 연습 / stamp timing practice</div>
    <div class="desc">기준선에 맞춰 도장을 찍는다. 성공할수록 도장 로그가 누적되고, 플레이어 이름별 점수가 랭킹에 저장된다.</div>
    <div class="panel"><div id="status"></div></div>
    <div class="panel">
      <div style="margin-bottom:6px; font-size:11px; opacity:0.7;">local ranking</div>
      <div id="ranking"></div>
      <div class="small" style="margin-top:8px;">같은 브라우저 안에서만 저장됨</div>
    </div>
  </div>

  <div class="controls">
    <label for="playerName">player name</label>
    <input id="playerName" type="text" maxlength="12" placeholder="이름 입력" />
    <button id="startBtn">save name</button>
    <button id="playBtn">start game</button>
    <button id="pauseBtn" class="secondary">pause</button>
    <button id="saveScoreBtn" class="secondary">score save</button>
    <button id="restartBtn" class="secondary">restart</button>
    <div class="small" id="playerLabel">current player : anonymous</div>
  </div>

  <div class="hint">space: 도장 찍기 / 시작 / 재시작\np: 일시정지\nenter: 현재 점수 저장</div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script>
    let laneY;
    let gameState = 'ready'; // ready, playing, paused, gameover
    let targetX;
    let barX;
    let barW;
    let barSpeed;
    let score;
    let misses;
    let combo;
    let bestCombo;
    let lastResult = 'READY';
    let timeLeft = 30 * 60; // 30 seconds at 60fps
    let flashTimer = 0;
    let marks = [];
    let passCount = 0;
    let playerName = 'anonymous';
    let ranking = [];
    let stampSprites = [];
    let stampLogCols = 5;

    const STORAGE_KEY = 'stamp-timing-ranking-v1';
    const PLAYER_KEY = 'stamp-timing-player-v1';

    function setup() {
      createCanvas(windowWidth, windowHeight);
      textFont('Helvetica Neue, Arial, sans-serif');
      rectMode(CORNER);
      buildStampSprites();
      loadRanking();
      loadPlayer();
      attachUI();
      resetGame();
      updateRankingUI();
    }

    function buildStampSprites() {
      stampSprites = [
        [
          '0001111111000',
          '0011111111100',
          '0111000001110',
          '1110011100111',
          '1100111110011',
          '1101110111011',
          '1101110111011',
          '1100111110011',
          '1110011100111',
          '0111000001110',
          '0011111111100',
          '0001111111000'
        ],
        [
          '0000111110000',
          '0011111111100',
          '0111100011110',
          '1110000000111',
          '1100111110011',
          '1101110011011',
          '1101110011011',
          '1100111110011',
          '1110000000111',
          '0111100011110',
          '0011111111100',
          '0000111110000'
        ],
        [
          '0001111111000',
          '0011000001100',
          '0110011100110',
          '1100111110011',
          '1101110111011',
          '1111100011111',
          '1111100011111',
          '1101110111011',
          '1100111110011',
          '0110011100110',
          '0011000001100',
          '0001111111000'
        ]
      ];
    }

    function loadRanking() {
      try {
        ranking = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {
        ranking = [];
      }
    }

    function saveRanking() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ranking));
    }

    function loadPlayer() {
      const saved = localStorage.getItem(PLAYER_KEY);
      if (saved) playerName = saved;
      const input = document.getElementById('playerName');
      input.value = playerName === 'anonymous' ? '' : playerName;
      updatePlayerLabel();
    }

    function updatePlayerLabel() {
      document.getElementById('playerLabel').textContent = 'current player : ' + playerName;
    }

    function attachUI() {
      document.getElementById('startBtn').addEventListener('click', () => {
        const value = document.getElementById('playerName').value.trim();
        playerName = value || 'anonymous';
        localStorage.setItem(PLAYER_KEY, playerName);
        updatePlayerLabel();
      });

      document.getElementById('playBtn').addEventListener('click', () => {
        startGame();
      });

      document.getElementById('pauseBtn').addEventListener('click', () => {
        togglePause();
      });

      document.getElementById('restartBtn').addEventListener('click', () => {
        resetGame();
      });

      document.getElementById('saveScoreBtn').addEventListener('click', () => {
        saveCurrentScore();
      });
    }

    function resetGame() {
      laneY = height * 0.58;
      targetX = width * 0.72;
      barX = width * 0.12;
      barW = max(24, width * 0.035);
      barSpeed = max(5.5, width * 0.008);
      score = 0;
      misses = 0;
      combo = 0;
      bestCombo = 0;
      passCount = 0;
      lastResult = 'READY';
      flashTimer = 0;
      marks = [];
      timeLeft = 30 * 60;
      gameState = 'ready';
    }

    function draw() {
      background(244, 244, 241);
      drawGrid();
      drawLane();
      if (gameState === 'playing') {
        updateBar();
        timeLeft--;
        if (timeLeft <= 0) {
          timeLeft = 0;
          gameState = 'gameover';
          lastResult = 'FINISHED';
          flashTimer = 30;
        }
      } else {
        drawBar();
      }
      drawTarget();
      drawStampArea();
      drawMarks();
      drawResultFlash();
      drawStateOverlay();
      updateUI();
    }

    function drawGrid() {
      stroke(228);
      strokeWeight(1);
      for (let x = 0; x < width; x += 28) line(x, 0, x, height);
      for (let y = 0; y < height; y += 28) line(0, y, width, y);
    }

    function drawLane() {
      let left = width * 0.12;
      let right = width * 0.88;
      stroke(40);
      strokeWeight(1.2);
      line(left, laneY, right, laneY);
      for (let x = left; x <= right; x += 40) {
        stroke(180);
        line(x, laneY - 10, x, laneY + 10);
      }
      noStroke();
      fill(20);
      rect(left, laneY - 18, 8, 36);
      rect(right - 8, laneY - 18, 8, 36);
    }

    function drawBar() {
      fill(20);
      noStroke();
      rect(barX, laneY - 22, barW, 44);
    }

    function updateBar() {
      drawBar();
      barX += barSpeed;
      if (barX > width * 0.88) {
        misses++;
        combo = 0;
        passCount++;
        lastResult = 'MISS';
        flashTimer = 18;
        pushMissMark();
        resetBar();
      }
    }

    function drawTarget() {
      noFill();
      stroke(20);
      strokeWeight(2);
      rect(targetX - 18, laneY - 32, 36, 64);
      stroke(20, 100);
      line(targetX, laneY - 46, targetX, laneY + 46);
    }

    function drawStampArea() {
      let paperX = width * 0.72;
      let paperY = height * 0.79;
      let paperW = min(390, width * 0.46);
      let paperH = min(220, height * 0.24);

      stroke(110);
      strokeWeight(1);
      noFill();
      rectMode(CENTER);
      rect(paperX, paperY, paperW, paperH);

      stroke(215);
      for (let y = paperY - paperH / 2 + 18; y < paperY + paperH / 2; y += 22) {
        line(paperX - paperW / 2 + 16, y, paperX + paperW / 2 - 16, y);
      }

      fill(20);
      noStroke();
      textAlign(LEFT, CENTER);
      textSize(11);
      text('stamp log', paperX - paperW / 2, paperY - paperH / 2 - 18);
    }

    function drawMarks() {
      const paperX = width * 0.72;
      const paperY = height * 0.79;
      const paperW = min(390, width * 0.46);
      const paperH = min(220, height * 0.24);
      const startX = paperX - paperW / 2 + 38;
      const startY = paperY - paperH / 2 + 40;
      const gapX = 64;
      const gapY = 52;

      for (let i = 0; i < marks.length; i++) {
        const m = marks[i];
        const col = i % stampLogCols;
        const row = floor(i / stampLogCols);
        m.x = startX + col * gapX;
        m.y = startY + row * gapY;

        if (m.type === 'miss') {
          stroke(30, 70);
          noFill();
          ellipse(m.x, m.y, 10, 10);
          line(m.x - 8, m.y - 8, m.x + 8, m.y + 8);
          line(m.x + 8, m.y - 8, m.x - 8, m.y + 8);
        } else {
          drawPixelStamp(m.x, m.y, m.variant, m.type === 'perfect' ? 3 : 2, m.type === 'perfect' ? 120 : 90);
        }
      }
    }

    function drawPixelStamp(cx, cy, variant, dot, alpha) {
      const sprite = stampSprites[variant % stampSprites.length];
      noStroke();
      for (let y = 0; y < sprite.length; y++) {
        for (let x = 0; x < sprite[y].length; x++) {
          if (sprite[y][x] === '1') {
            fill(20, alpha);
            rect(cx + (x - sprite[y].length / 2) * dot, cy + (y - sprite.length / 2) * dot, dot, dot);
          }
        }
      }
    }

    function drawResultFlash() {
      if (flashTimer <= 0) return;
      let alpha = map(flashTimer, 18, 0, 120, 0);
      noStroke();
      fill(20, alpha);
      textAlign(CENTER, CENTER);
      textSize(22);
      text(lastResult, width * 0.5, height * 0.32);
      flashTimer--;
    }

    function updateUI() {
      const seconds = (timeLeft / 60).toFixed(1);
      document.getElementById('status').textContent =
        'player  : ' + playerName + '\n' +
        'state   : ' + gameState + '\n' +
        'time    : ' + seconds + 's\n' +
        'score   : ' + score + '\n' +
        'combo   : ' + combo + '\n' +
        'best    : ' + bestCombo + '\n' +
        'miss    : ' + misses + '\n' +
        'result  : ' + lastResult;
    }

    function drawStateOverlay() {
      if (gameState === 'playing') return;
      let message = '';
      if (gameState === 'ready') message = 'SPACE or START GAME';
      if (gameState === 'paused') message = 'PAUSED';
      if (gameState === 'gameover') message = 'GAME OVER';
      noStroke();
      fill(255, 255, 255, 160);
      rectMode(CORNER);
      rect(0, 0, width, height);
      fill(20);
      textAlign(CENTER, CENTER);
      textSize(24);
      text(message, width * 0.5, height * 0.45);
      textSize(12);
      if (gameState === 'ready') text('게임이 자동으로 흐르지 않도록 시작 전에는 멈춰 있습니다.', width * 0.5, height * 0.5);
      if (gameState === 'paused') text('다시 시작하려면 P 또는 START GAME', width * 0.5, height * 0.5);
      if (gameState === 'gameover') text('ENTER로 점수 저장 / SPACE로 새 게임', width * 0.5, height * 0.5);
    }

    function startGame() {
      if (gameState === 'gameover') {
        resetGame();
      }
      gameState = 'playing';
      lastResult = 'START';
      flashTimer = 18;
    }

    function togglePause() {
      if (gameState === 'playing') {
        gameState = 'paused';
        lastResult = 'PAUSED';
        flashTimer = 18;
      } else if (gameState === 'paused' || gameState === 'ready') {
        gameState = 'playing';
        lastResult = 'RESUME';
        flashTimer = 18;
      }
    }

    function keyPressed() {
      if (key === 'r' || key === 'R') {
        resetGame();
        return;
      }
      if (key === 'p' || key === 'P') {
        togglePause();
        return;
      }
      if (keyCode === 13) {
        saveCurrentScore();
        return;
      }
      if (keyCode === 32) {
        if (gameState === 'ready' || gameState === 'paused') {
          startGame();
          return;
        }
        if (gameState === 'gameover') {
          resetGame();
          startGame();
          return;
        }
        if (gameState === 'playing') {
          hitStamp();
        }
      }
    }

    function hitStamp() {
      if (gameState !== 'playing') return;
      let barCenter = barX + barW / 2;
      let distance = abs(barCenter - targetX);
      if (distance <= 8) {
        score += 2;
        combo += 1;
        bestCombo = max(bestCombo, combo);
        lastResult = 'PERFECT';
        pushStampMark('perfect');
      } else if (distance <= 18) {
        score += 1;
        combo += 1;
        bestCombo = max(bestCombo, combo);
        lastResult = 'GOOD';
        pushStampMark('good');
      } else {
        misses += 1;
        combo = 0;
        lastResult = 'MISS';
        pushMissMark();
      }
      flashTimer = 18;
      passCount++;
      resetBar();
    }

    function pushStampMark(type) {
      marks.push({ type, variant: floor(random(stampSprites.length)) });
      trimMarks();
    }

    function pushMissMark() {
      marks.push({ type: 'miss', variant: 0 });
      trimMarks();
    }

    function trimMarks() {
      const maxMarks = 20;
      if (marks.length > maxMarks) {
        marks = marks.slice(marks.length - maxMarks);
      }
    }

    function resetBar() {
      barX = width * 0.12;
      if (passCount > 0 && passCount % 6 === 0) {
        barSpeed += 0.4;
      }
    }

    function saveCurrentScore() {
      if (score <= 0 && bestCombo <= 0) return;
      const entry = {
        name: playerName || 'anonymous',
        score,
        bestCombo,
        misses,
        time: new Date().toISOString()
      };
      ranking.push(entry);
      ranking.sort((a, b) => b.score - a.score || b.bestCombo - a.bestCombo || a.misses - b.misses);
      ranking = ranking.slice(0, 8);
      saveRanking();
      updateRankingUI();
      lastResult = 'SAVED';
      flashTimer = 18;
    }

    function updateRankingUI() {
      const el = document.getElementById('ranking');
      if (!ranking.length) {
        el.innerHTML = '<div class="small">no saved scores</div>';
        return;
      }
      el.innerHTML = ranking.map((r, i) => {
        return '<div class="rank-item"><span>' + (i + 1) + '. ' + escapeHtml(r.name) + '</span><span>' + r.score + ' pt / c' + r.bestCombo + '</span></div>';
      }).join('');
    }

    function escapeHtml(str) {
      return str.replace(/[&<>\"']/g, function(tag) {
        const chars = {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        };
        return chars[tag] || tag;
      });
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      laneY = height * 0.58;
      targetX = width * 0.72;
    }
  </script>
</body>
</html>
