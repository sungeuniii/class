<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>도장 타이밍 연습</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f4f4f1;
      color: #111;
      font-family: "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    #ui {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      font-size: 12px;
      line-height: 1.7;
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    .title {
      font-size: 14px;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .desc {
      opacity: 0.75;
      margin-bottom: 10px;
      max-width: 320px;
    }

    .hint {
      position: fixed;
      bottom: 16px;
      left: 18px;
      font-size: 11px;
      opacity: 0.65;
      z-index: 10;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="title">도장 타이밍 연습 / stamp timing practice</div>
    <div class="desc">타이밍 바가 기준선에 들어올 때 스페이스를 눌러 도장을 찍는다. 너무 빠르거나 늦으면 실패한다.</div>
    <div id="status"></div>
  </div>

  <div class="hint">space: 도장 찍기 / r: 다시 시작</div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script>
    let laneY;
    let targetX;
    let barX;
    let barW;
    let barSpeed;
    let score;
    let misses;
    let combo;
    let lastResult = 'READY';
    let flashTimer = 0;
    let marks = [];
    let started = false;
    let passCount = 0;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      textFont('Helvetica Neue, Arial, sans-serif');
      resetGame();
    }

    function resetGame() {
      laneY = height * 0.58;
      targetX = width * 0.72;
      barX = width * 0.12;
      barW = max(24, width * 0.035);
      barSpeed = max(5.5, width * 0.008);
      score = 0;
      misses = 0;
      combo = 0;
      passCount = 0;
      lastResult = 'READY';
      flashTimer = 0;
      marks = [];
      started = true;
    }

    function draw() {
      background(244, 244, 241);
      drawGrid();
      drawLane();
      updateBar();
      drawTarget();
      drawStampArea();
      drawMarks();
      drawResultFlash();
      updateUI();
    }

    function drawGrid() {
      stroke(228);
      strokeWeight(1);
      for (let x = 0; x < width; x += 28) line(x, 0, x, height);
      for (let y = 0; y < height; y += 28) line(0, y, width, y);
    }

    function drawLane() {
      let left = width * 0.12;
      let right = width * 0.88;

      stroke(40);
      strokeWeight(1.2);
      line(left, laneY, right, laneY);

      for (let x = left; x <= right; x += 40) {
        stroke(180);
        line(x, laneY - 10, x, laneY + 10);
      }

      noStroke();
      fill(20);
      rect(left, laneY - 18, 8, 36);
      rect(right - 8, laneY - 18, 8, 36);
    }

    function updateBar() {
      fill(20);
      noStroke();
      rect(barX, laneY - 22, barW, 44, 2);

      barX += barSpeed;

      if (barX > width * 0.88) {
        misses++;
        combo = 0;
        passCount++;
        lastResult = 'MISS';
        flashTimer = 18;
        resetBar();
      }
    }

    function drawTarget() {
      noFill();
      stroke(20);
      strokeWeight(2);
      rect(targetX - 18, laneY - 32, 36, 64, 2);

      stroke(20, 100);
      line(targetX, laneY - 46, targetX, laneY + 46);
    }

    function drawStampArea() {
      let paperX = width * 0.72;
      let paperY = height * 0.78;
      let paperW = min(360, width * 0.44);
      let paperH = min(180, height * 0.18);

      stroke(110);
      strokeWeight(1);
      noFill();
      rectMode(CENTER);
      rect(paperX, paperY, paperW, paperH);

      stroke(215);
      for (let y = paperY - paperH / 2 + 20; y < paperY + paperH / 2; y += 22) {
        line(paperX - paperW / 2 + 20, y, paperX + paperW / 2 - 20, y);
      }

      fill(20);
      noStroke();
      textAlign(LEFT, CENTER);
      textSize(11);
      text('stamp log', paperX - paperW / 2, paperY - paperH / 2 - 18);
    }

    function drawMarks() {
      rectMode(CENTER);
      textAlign(CENTER, CENTER);

      for (let m of marks) {
        if (m.type === 'perfect') {
          noFill();
          stroke(20, m.a);
          strokeWeight(1.4);
          rect(m.x, m.y, 58, 38, 2);
          noStroke();
          fill(20, m.a);
          textSize(10);
          text('STAMP', m.x, m.y + 1);
        } else if (m.type === 'good') {
          noFill();
          stroke(20, m.a);
          strokeWeight(1);
          rect(m.x, m.y, 48, 32, 2);
        } else {
          stroke(20, m.a);
          noFill();
          ellipse(m.x, m.y, 10, 10);
        }
        m.a -= 0.5;
      }

      marks = marks.filter(m => m.a > 0);
    }

    function drawResultFlash() {
      if (flashTimer <= 0) return;

      let txt = lastResult;
      let alpha = map(flashTimer, 18, 0, 120, 0);

      noStroke();
      fill(20, alpha);
      textAlign(CENTER, CENTER);
      textSize(22);
      text(txt, width * 0.5, height * 0.32);

      flashTimer--;
    }

    function updateUI() {
      document.getElementById('status').textContent =
        'score   : ' + score + '\n' +
        'combo   : ' + combo + '\n' +
        'miss    : ' + misses + '\n' +
        'result  : ' + lastResult;
    }

    function keyPressed() {
      if (key === 'r' || key === 'R') {
        resetGame();
        return;
      }

      if (keyCode === 32) {
        hitStamp();
      }
    }

    function hitStamp() {
      let barCenter = barX + barW / 2;
      let distance = abs(barCenter - targetX);
      let paperX = width * 0.72;
      let paperY = height * 0.78;

      if (distance <= 8) {
        score += 2;
        combo += 1;
        lastResult = 'PERFECT';
        marks.push({
          x: paperX + random(-110, 110),
          y: paperY + random(-45, 45),
          a: 120,
          type: 'perfect'
        });
      } else if (distance <= 18) {
        score += 1;
        combo += 1;
        lastResult = 'GOOD';
        marks.push({
          x: paperX + random(-110, 110),
          y: paperY + random(-45, 45),
          a: 90,
          type: 'good'
        });
      } else {
        misses += 1;
        combo = 0;
        lastResult = 'MISS';
        marks.push({
          x: paperX + random(-110, 110),
          y: paperY + random(-45, 45),
          a: 70,
          type: 'miss'
        });
      }

      flashTimer = 18;
      passCount++;
      resetBar();
    }

    function resetBar() {
      barX = width * 0.12;
      if (passCount > 0 && passCount % 6 === 0) {
        barSpeed += 0.4;
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      laneY = height * 0.58;
      targetX = width * 0.72;
    }
  </script>
</body>
</html>
